<!doctype html>
<html lang="en">
	<head>
		<title>Template</title>
		<style>
			@font-face {
				font-family: Newsreader;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/newsreader-v26-latin-500.woff2) format('woff2');
			}
			@font-face {
				font-family: IBM Plex Mono;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/ibm-plex-mono-v20-latin-500.woff2) format('woff2');
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			.container {
				width: 1200px;
				height: 630px;
			}
			.card {
				display: flex;
				width: 100%;
				height: 100%;
				padding: 72px 80px 56px;
				background: #ffedf9;
				flex-direction: column;
			}
			.eyebrow {
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 20px;
				font-weight: 500;
				letter-spacing: 0.2em;
				text-transform: uppercase;
			}
			.title {
				display: flex;
				flex: 1;
				align-items: center;
				color: #2d0a2e;
				font-family: Newsreader, Georgia, serif;
				font-size: 76px;
				font-weight: 500;
				line-height: 1.06;
				letter-spacing: -0.022em;
				text-wrap: balance;
			}
			.footer {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.footer-text {
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 20px;
				font-weight: 500;
				letter-spacing: 0.1em;
			}
			.logo img {
				display: block;
				width: 72px;
				height: 72px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div class="eyebrow">Luka Harambasic</div>
				<div class="title">Will be replaced! Wuhu! Party :)</div>
				<div class="footer">
					<div class="footer-text">harambasic.de</div>
					<div class="logo">
						<img src="../../public/logo.svg" alt="" />
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
