<!doctype html>
<html lang="en">
	<head>
		<title>LinkedIn banner template</title>
		<style>
			@font-face {
				font-family: Newsreader;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/newsreader-v26-latin-500.woff2) format('woff2');
			}
			@font-face {
				font-family: Newsreader;
				font-weight: 500;
				font-style: italic;
				src: url(../../public/fonts/newsreader-v26-latin-500italic.woff2) format('woff2');
			}
			@font-face {
				font-family: IBM Plex Mono;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/ibm-plex-mono-v20-latin-500.woff2) format('woff2');
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			/* LinkedIn profile cover: 1584 x 396 (4:1). Rendered at 2x device scale. */
			.container {
				width: 1584px;
				height: 396px;
			}
			.card {
				display: flex;
				width: 100%;
				height: 100%;
				/* Content is right-aligned: the profile photo overlaps the lower-left on
				   LinkedIn, so the left half is deliberately kept clear. */
				padding: 52px 88px;
				background: #ffedf9;
				flex-direction: column;
				justify-content: center;
				align-items: flex-end;
				gap: 22px;
				text-align: right;
			}
			.brand {
				display: flex;
				align-items: center;
				gap: 16px;
			}
			.brand img {
				display: block;
				width: 48px;
				height: 48px;
			}
			.eyebrow {
				display: flex;
				align-items: center;
				gap: 16px;
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 17px;
				font-weight: 500;
				letter-spacing: 0.2em;
				text-transform: uppercase;
			}
			/* The recurring 2px ink rule, trailing into the empty left space. */
			.eyebrow::before {
				width: 48px;
				height: 2px;
				background: #2d0a2e;
				content: '';
			}
			.title {
				max-width: 20ch;
				color: #2d0a2e;
				font-family: Newsreader, Georgia, serif;
				font-size: 60px;
				font-weight: 500;
				line-height: 1.04;
				letter-spacing: -0.022em;
				text-wrap: balance;
			}
			/* Italic segments colour-shift on light grounds. */
			.title em {
				color: #653366;
				font-style: italic;
			}
			.areas {
				display: flex;
				align-items: center;
				gap: 36px;
			}
			.area {
				display: flex;
				align-items: center;
				gap: 11px;
				color: #2d0a2e;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 19px;
				font-weight: 500;
				letter-spacing: 0.14em;
				text-transform: uppercase;
			}
			.area svg {
				display: block;
				width: 27px;
				height: 27px;
			}
			.footer-text {
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 17px;
				font-weight: 500;
				letter-spacing: 0.1em;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div class="brand">
					<div class="eyebrow">Harambasic Consulting</div>
					<img src="../../public/logo.svg" alt="" />
				</div>
				<div class="title">I help you put <em>AI</em> to work.</div>
				<div class="areas">
					<div class="area">
						<svg viewBox="0 0 256 256" fill="#2d0a2e" aria-hidden="true">
							<g fill="currentColor">
								<path
									d="m194.82 151.43l-55.09 20.3l-20.3 55.09a7.92 7.92 0 0 1-14.86 0l-20.3-55.09l-55.09-20.3a7.92 7.92 0 0 1 0-14.86l55.09-20.3l20.3-55.09a7.92 7.92 0 0 1 14.86 0l20.3 55.09l55.09 20.3a7.92 7.92 0 0 1 0 14.86"
									opacity=".2"
								/>
								<path
									d="M197.58 129.06L146 110l-19-51.62a15.92 15.92 0 0 0-29.88 0L78 110l-51.62 19a15.92 15.92 0 0 0 0 29.88L78 178l19 51.62a15.92 15.92 0 0 0 29.88 0L146 178l51.62-19a15.92 15.92 0 0 0 0-29.88ZM137 164.22a8 8 0 0 0-4.74 4.74L112 223.85L91.78 169a8 8 0 0 0-4.78-4.78L32.15 144L87 123.78a8 8 0 0 0 4.78-4.78L112 64.15L132.22 119a8 8 0 0 0 4.74 4.74L191.85 144ZM144 40a8 8 0 0 1 8-8h16V16a8 8 0 0 1 16 0v16h16a8 8 0 0 1 0 16h-16v16a8 8 0 0 1-16 0V48h-16a8 8 0 0 1-8-8m104 48a8 8 0 0 1-8 8h-8v8a8 8 0 0 1-16 0v-8h-8a8 8 0 0 1 0-16h8v-8a8 8 0 0 1 16 0v8h8a8 8 0 0 1 8 8"
								/>
							</g>
						</svg>
						<span>AI</span>
					</div>
					<div class="area">
						<svg viewBox="0 0 256 256" fill="#2d0a2e" aria-hidden="true">
							<g fill="currentColor">
								<path
									d="M128 32a96 96 0 1 0 96 96a96 96 0 0 0-96-96m16 112l-64 32l32-64l64-32Z"
									opacity=".2"
								/>
								<path
									d="M128 24a104 104 0 1 0 104 104A104.11 104.11 0 0 0 128 24m0 192a88 88 0 1 1 88-88a88.1 88.1 0 0 1-88 88m44.42-143.16l-64 32a8.05 8.05 0 0 0-3.58 3.58l-32 64A8 8 0 0 0 80 184a8.1 8.1 0 0 0 3.58-.84l64-32a8.05 8.05 0 0 0 3.58-3.58l32-64a8 8 0 0 0-10.74-10.74M138 138l-40.11 20.11L118 118l40.15-20.07Z"
								/>
							</g>
						</svg>
						<span>Product</span>
					</div>
					<div class="area">
						<svg viewBox="0 0 256 256" fill="#2d0a2e" aria-hidden="true">
							<g fill="currentColor">
								<path d="M80 176a32 32 0 1 1-32-32a32 32 0 0 1 32 32" opacity=".2" />
								<path
									d="m245.66 74.34l-32-32a8 8 0 0 0-11.32 11.32L220.69 72H208c-49.33 0-61.05 28.12-71.38 52.92c-9.38 22.51-16.92 40.59-49.48 42.84a40 40 0 1 0 .1 16c43.26-2.65 54.34-29.15 64.14-52.69C161.41 107 169.33 88 208 88h12.69l-18.35 18.34a8 8 0 0 0 11.32 11.32l32-32a8 8 0 0 0 0-11.32M48 200a24 24 0 1 1 24-24a24 24 0 0 1-24 24"
								/>
							</g>
						</svg>
						<span>Automation</span>
					</div>
				</div>
				<div class="footer-text">harambasic.de</div>
			</div>
		</div>
	</body>
</html>
