<!doctype html>
<html lang="en">
	<head>
		<title>LinkedIn banner template</title>
		<style>
			@font-face {
				font-family: Newsreader;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/newsreader-v26-latin-500.woff2) format('woff2');
			}
			@font-face {
				font-family: Newsreader;
				font-weight: 500;
				font-style: italic;
				src: url(../../public/fonts/newsreader-v26-latin-500italic.woff2) format('woff2');
			}
			@font-face {
				font-family: IBM Plex Mono;
				font-weight: 500;
				font-style: normal;
				src: url(../../public/fonts/ibm-plex-mono-v20-latin-500.woff2) format('woff2');
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			/* LinkedIn profile cover: 1584 x 396 (4:1). */
			.container {
				width: 1584px;
				height: 396px;
			}
			.card {
				display: flex;
				width: 100%;
				height: 100%;
				padding: 56px 96px;
				background: #ffedf9;
				justify-content: space-between;
				align-items: center;
				gap: 64px;
			}
			.content {
				display: flex;
				flex-direction: column;
				gap: 20px;
			}
			.eyebrow {
				display: flex;
				align-items: center;
				gap: 18px;
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 18px;
				font-weight: 500;
				letter-spacing: 0.2em;
				text-transform: uppercase;
			}
			/* The recurring 2px ink rule beneath eyebrows. */
			.eyebrow::after {
				width: 56px;
				height: 2px;
				background: #2d0a2e;
				content: '';
			}
			.title {
				max-width: 18ch;
				color: #2d0a2e;
				font-family: Newsreader, Georgia, serif;
				font-size: 64px;
				font-weight: 500;
				line-height: 1.04;
				letter-spacing: -0.022em;
				text-wrap: balance;
			}
			/* Italic segments colour-shift on light grounds. */
			.title em {
				color: #653366;
				font-style: italic;
			}
			.footer-text {
				color: #6f5a6c;
				font-family: 'IBM Plex Mono', monospace;
				font-size: 18px;
				font-weight: 500;
				letter-spacing: 0.1em;
			}
			.logo {
				flex-shrink: 0;
			}
			.logo img {
				display: block;
				width: 200px;
				height: 200px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="card">
				<div class="content">
					<div class="eyebrow">Harambasic Consulting</div>
					<div class="title">I help you put <em>AI</em> to work.</div>
					<div class="footer-text">harambasic.de</div>
				</div>
				<div class="logo">
					<img src="../../public/logo.svg" alt="" />
				</div>
			</div>
		</div>
	</body>
</html>
