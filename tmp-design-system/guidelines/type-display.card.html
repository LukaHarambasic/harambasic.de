<!-- @dsCard group="Type" viewport="700x220" name="Display serif — Newsreader" subtitle="The voice of the brand: warm, editorial, human" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); }
  .wrap { padding: var(--sp-6) var(--sp-7); }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--sp-4); }
  .big { font-family: var(--font-serif); font-size: 68px; line-height: 1.0; letter-spacing: var(--tracking-display); color: var(--text-strong); font-weight: 500; margin: 0; }
  .big em { font-style: italic; font-weight: 500; color: var(--aub-600); }
  .meta { margin-top: var(--sp-5); font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); display: flex; gap: var(--sp-5); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Display · Newsreader</div>
    <p class="big">I help you put<br /><em>AI to work.</em></p>
    <div class="meta"><span>Newsreader 500</span><span>72 / 64 px</span><span>tracking −0.022em</span></div>
  </div>
</body>
</html>
