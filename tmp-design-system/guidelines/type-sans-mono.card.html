<!-- @dsCard group="Type" viewport="700x200" name="Sans & mono detail" subtitle="Hanken Grotesk for clarity, IBM Plex Mono for labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); }
  .wrap { padding: var(--sp-6) var(--sp-7); display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-7); }
  .col h4 { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-muted); margin: 0 0 var(--sp-4); font-weight: 500; }
  .sans-row { font-family: var(--font-sans); color: var(--text-strong); font-size: 22px; line-height: 1.5; }
  .w4 { font-weight: 400; } .w5 { font-weight: 500; } .w6 { font-weight: 600; } .w7 { font-weight: 700; }
  .mono { font-family: var(--font-mono); font-size: 13px; color: var(--text-body); line-height: 1.9; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--clay-600); }
  .chip { display: inline-block; font-family: var(--font-mono); font-size: 11px; padding: 4px 9px; border-radius: 999px; background: var(--aub-900); color: var(--rose-100); letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <h4>Hanken Grotesk</h4>
      <div class="sans-row w4">Regular 400</div>
      <div class="sans-row w5">Medium 500</div>
      <div class="sans-row w6">Semibold 600</div>
      <div class="sans-row w7">Bold 700</div>
    </div>
    <div class="col">
      <h4>IBM Plex Mono</h4>
      <div class="mono">scope · timeline · rate<br />0123456789 → ()[]{}</div>
      <div style="margin-top: var(--sp-4); display:flex; gap:var(--sp-3); align-items:center;">
        <span class="eyebrow">Phase 01</span>
        <span class="chip">AI ADOPTION</span>
      </div>
    </div>
  </div>
</body>
</html>
