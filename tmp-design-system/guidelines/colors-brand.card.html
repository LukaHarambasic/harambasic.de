<!-- @dsCard group="Colors" viewport="700x190" name="Brand colors" subtitle="The two colors the whole system grows from" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); padding: var(--sp-5); }
  .chip { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .swatch { height: 92px; display: flex; align-items: flex-end; padding: var(--sp-3); }
  .meta { padding: var(--sp-3) var(--sp-4); background: var(--surface-card); }
  .name { font-weight: var(--fw-semibold); color: var(--text-strong); font-size: var(--fs-body-sm); }
  .hex { font-family: var(--font-mono); font-size: var(--fs-caption); color: var(--text-muted); margin-top: 2px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="chip">
      <div class="swatch" style="background: var(--aub-900);"><span class="tag" style="color: var(--rose-100);">Ink</span></div>
      <div class="meta"><div class="name">Aubergine</div><div class="hex">#2d0a2e · --aub-900</div></div>
    </div>
    <div class="chip">
      <div class="swatch" style="background: var(--rose-100); border-bottom: 1px solid var(--border-subtle);"><span class="tag" style="color: var(--aub-700);">Ground</span></div>
      <div class="meta"><div class="name">Soft Pink</div><div class="hex">#ffedf9 · --rose-100</div></div>
    </div>
  </div>
</body>
</html>
