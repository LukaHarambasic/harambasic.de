<!-- @dsCard group="Spacing" viewport="700x150" name="Rules & dividers" subtitle="Fine hairlines and the short ink accent rule" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); }
  .wrap { padding: var(--sp-6) var(--sp-7); display: grid; gap: var(--sp-5); align-content: center; }
  .row { display: grid; gap: var(--sp-2); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); letter-spacing: 0.06em; }
  .rule { border: 0; border-top: 1px solid var(--hairline); margin: 0; }
  .rule.strong { border-top: 1.5px solid var(--border-strong); }
  .rule.ink { border-top: 2px solid var(--aub-900); width: 54px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="lab">hairline · --hairline</span><hr class="rule" /></div>
    <div class="row"><span class="lab">strong · --border-strong</span><hr class="rule strong" /></div>
    <div class="row"><span class="lab">ink accent rule · the recurring eyebrow underline</span><hr class="rule ink" /></div>
  </div>
</body>
</html>
