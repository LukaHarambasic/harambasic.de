<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid — generous, the ground should breathe" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-mono); }
  .wrap { padding: var(--sp-6) var(--sp-7); display: grid; gap: var(--sp-3); }
  .row { display: grid; grid-template-columns: 64px 56px 1fr; align-items: center; gap: var(--sp-4); }
  .name { font-size: 11px; color: var(--text-strong); }
  .px { font-size: 11px; color: var(--text-subtle); }
  .bar { height: 16px; background: var(--aub-500); border-radius: 3px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="name">--sp-1</span><span class="px">4px</span><div class="bar" style="width:4px;"></div></div>
    <div class="row"><span class="name">--sp-2</span><span class="px">8px</span><div class="bar" style="width:8px;"></div></div>
    <div class="row"><span class="name">--sp-3</span><span class="px">12px</span><div class="bar" style="width:12px;"></div></div>
    <div class="row"><span class="name">--sp-4</span><span class="px">16px</span><div class="bar" style="width:16px;"></div></div>
    <div class="row"><span class="name">--sp-5</span><span class="px">24px</span><div class="bar" style="width:24px;"></div></div>
    <div class="row"><span class="name">--sp-6</span><span class="px">32px</span><div class="bar" style="width:32px;"></div></div>
    <div class="row"><span class="name">--sp-7</span><span class="px">48px</span><div class="bar" style="width:48px;"></div></div>
    <div class="row"><span class="name">--sp-8</span><span class="px">64px</span><div class="bar" style="width:64px;"></div></div>
  </div>
</body>
</html>
