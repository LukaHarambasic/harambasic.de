<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); }
  .wrap { padding: var(--sp-6); display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sp-5); }
  .tile { border-radius: var(--radius-lg); height: 150px; display: flex; align-items: center; justify-content: center; box-shadow: var(--ring-hairline); position: relative; overflow: hidden; }
  .tile img { height: 104px; width: auto; }
  .pink-tile { background: var(--rose-100); border-radius: var(--radius-lg); padding: 10px 14px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }
  .pink-tile img { height: 92px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-subtle); text-align: center; margin-top: var(--sp-3); letter-spacing: 0.04em; }
  .on-pink { background: var(--rose-100); }
  .on-paper { background: var(--surface-paper); }
  .on-ink { background: var(--aub-900); }
  .g { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="tile on-pink"><div class="g"></div><img src="../assets/logo-mark-transparent.png" alt="mark on pink" /></div>
      <div class="cap">on pink ground</div>
    </div>
    <div>
      <div class="tile on-paper"><div class="g"></div><img src="../assets/logo-mark-transparent.png" alt="mark on paper" /></div>
      <div class="cap">on warm paper</div>
    </div>
    <div>
      <div class="tile on-ink"><div class="pink-tile"><img src="../assets/logo-mark-transparent.png" alt="mark on ink" /></div></div>
      <div class="cap">pink tile on ink</div>
    </div>
  </div>
</body>
</html>
