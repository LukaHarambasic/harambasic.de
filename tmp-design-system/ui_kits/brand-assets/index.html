<!-- @dsCard group="Brand assets" viewport="900x620" name="Brand collateral" subtitle="Email signature, business card, avatar, letterhead" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brand assets — Harambasic Consulting</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--warm-100); color: var(--text-body); font-family: var(--font-sans); }
  .gallery { max-width: 980px; margin: 0 auto; padding: 40px 32px 64px; display: grid; gap: 28px; }
  .specimen { background: var(--surface-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 32px; }
  .specimen__label { font-family: var(--font-mono); font-size: 11px; letter-spacing: var(--tracking-eyebrow);
    text-transform: uppercase; color: var(--text-muted); margin: 0 0 20px; }
  .stage { display: flex; flex-wrap: wrap; gap: 28px; align-items: center; }

  /* Email signature */
  .sig { display: grid; grid-template-columns: auto 1px 1fr; gap: 20px; align-items: center; padding: 18px 22px;
    background: var(--surface-card); border-radius: var(--radius-md); box-shadow: var(--ring-hairline); max-width: 480px; }
  .sig__sep { width: 1px; align-self: stretch; background: var(--hairline); }
  .sig img { width: 60px; height: 60px; border-radius: 26%; }
  .sig__name { font-family: var(--font-serif); font-size: 20px; color: var(--text-strong); line-height: 1.1; }
  .sig__role { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--clay-600); margin-top: 4px; }
  .sig__links { display: flex; gap: 14px; margin-top: 10px; font-size: 13px; }
  .sig__links a { color: var(--text-link); text-decoration: none; }
  .sig__links a:hover { text-decoration: underline; }

  /* Business card */
  .bizcard { width: 340px; height: 200px; border-radius: var(--radius-md); padding: 26px; position: relative; overflow: hidden; box-shadow: var(--shadow-md); display: flex; flex-direction: column; justify-content: space-between; }
  .bizcard__grain { display: none; }
  .bizcard > * { position: relative; }
  .bizcard--front { background: var(--aub-900); color: var(--rose-100); }
  .bizcard--front img { width: 56px; height: 56px; }
  .bizcard--front .bc-tile { align-self: flex-start; background: var(--rose-100); border-radius: 22%; padding: 8px; display: inline-flex; box-shadow: var(--shadow-sm); }
  .bizcard--front .bc-tile img { width: 48px; height: 48px; }
  .bizcard--front .bc-name { font-family: var(--font-serif); font-size: 26px; }
  .bizcard--front .bc-sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--honey-400); margin-top: 4px; }
  .bizcard--back { background: var(--rose-100); color: var(--text-strong); }
  .bizcard--back .bc-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; color: var(--aub-700); }
  .bizcard--back .bc-big { font-family: var(--font-serif); font-size: 22px; color: var(--text-strong); line-height: 1.2; max-width: 16ch; }

  /* Avatars */
  .avatar-row { display: flex; gap: 20px; align-items: flex-end; }
  .av { background: var(--aub-900); overflow: hidden; box-shadow: var(--ring-hairline); }
  .av img { width: 100%; height: 100%; display: block; }
  .av--96 { width: 96px; height: 96px; border-radius: 26%; }
  .av--64 { width: 64px; height: 64px; border-radius: 26%; }
  .av--48 { width: 48px; height: 48px; border-radius: 999px; }
  .av--32 { width: 32px; height: 32px; border-radius: 999px; }

  /* Letterhead */
  .letterhead { border: 1px solid var(--hairline); border-radius: var(--radius-sm); overflow: hidden; max-width: 560px; width: 100%; }
  .letterhead__bar { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; background: var(--rose-100); border-bottom: 2px solid var(--aub-900); }
  .letterhead__bar img { width: 40px; height: 40px; }
  .letterhead__name { font-family: var(--font-serif); font-size: 18px; color: var(--text-strong); }
  .letterhead__meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .letterhead__body { padding: 22px 24px; }
  .letterhead__body .l1 { height: 8px; width: 70%; background: var(--warm-200); border-radius: 4px; margin-bottom: 10px; }
  .letterhead__body .l2 { height: 8px; width: 90%; background: var(--warm-100); border-radius: 4px; margin-bottom: 10px; }
  .letterhead__body .l3 { height: 8px; width: 50%; background: var(--warm-100); border-radius: 4px; }
</style>
</head>
<body>
  <div class="gallery">

    <div class="specimen">
      <p class="specimen__label">Email signature</p>
      <div class="sig">
        <img src="../../assets/logo-mark-transparent.png" alt="Luka" />
        <div class="sig__sep"></div>
        <div>
          <div class="sig__name">Luka Harambasic</div>
          <div class="sig__role">AI · Automation · Product</div>
          <div class="sig__links">
            <a href="#">hi@harambasic.de</a>
            <a href="#">harambasic.de</a>
          </div>
        </div>
      </div>
    </div>

    <div class="specimen">
      <p class="specimen__label">Business card · front &amp; back</p>
      <div class="stage">
        <div class="bizcard bizcard--front">
          <div class="bizcard__grain"></div>
          <span class="bc-tile"><img src="../../assets/logo-mark-transparent.png" alt="mark" /></span>
          <div>
            <div class="bc-name">Luka Harambasic</div>
            <div class="bc-sub">Independent Consultant</div>
          </div>
        </div>
        <div class="bizcard bizcard--back">
          <div class="bizcard__grain"></div>
          <div class="bc-big">I help you put AI to work.</div>
          <div>
            <div class="bc-row"><span>hi@harambasic.de</span><span>harambasic.de</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="specimen">
      <p class="specimen__label">Social &amp; profile avatar</p>
      <div class="avatar-row">
        <div class="av av--96"><img src="../../assets/logo-mark-transparent.png" alt="avatar" /></div>
        <div class="av av--64"><img src="../../assets/logo-mark-transparent.png" alt="avatar" /></div>
        <div class="av av--48"><img src="../../assets/logo-mark-transparent.png" alt="avatar" /></div>
        <div class="av av--32"><img src="../../assets/logo-mark-transparent.png" alt="avatar" /></div>
      </div>
    </div>

    <div class="specimen">
      <p class="specimen__label">Letterhead</p>
      <div class="letterhead">
        <div class="letterhead__bar">
          <div style="display:flex; align-items:center; gap:12px;">
            <img src="../../assets/logo-mark-transparent.png" alt="mark" />
            <span class="letterhead__name">Harambasic</span>
          </div>
          <span class="letterhead__meta">harambasic.de</span>
        </div>
        <div class="letterhead__body">
          <div class="l1"></div><div class="l2"></div><div class="l3"></div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
